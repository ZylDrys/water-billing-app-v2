<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#007bff">
<title>💧 Water Billing System</title>

<link rel="icon" href="icon-192.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:#f5f7fa;padding:15px;}
.container{max-width:600px;margin:auto;background:white;padding:20px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1);}
h1,h2{color:#333;margin-bottom:15px;}
button{background:#007bff;color:white;border:none;padding:12px;border-radius:8px;cursor:pointer;margin:5px 0;width:100%;font-weight:bold;}
button:hover{background:#0056b3;}
input,select{width:100%;padding:12px;margin:8px 0;border:1px solid #ccc;border-radius:8px;font-size:16px;}
.section{display:none;}
.section.active{display:block;}
.total-display{background:#28a745;color:white;padding:15px;border-radius:8px;text-align:center;font-size:20px;font-weight:bold;margin:15px 0;}
.settings-btn{background:#ffc107;color:#333;}
</style>
</head>

<body>

<div class="container">
<h1 style="text-align:center;">💧 Water Billing System</h1>

<!-- MENU -->
<div id="menuSection" class="section active">
<button onclick="showSection('newBillSection')">➕ New Bill</button>
<button onclick="showSection('customersSection')">👥 Customers</button>
<button onclick="showSection('historySection')">📋 History</button>
<button onclick="showSection('settingsSection')" class="settings-btn">⚙️ Settings</button>
<button onclick="exportToExcel()">📊 Export to Excel</button>
</div>

<!-- SETTINGS -->
<div id="settingsSection" class="section">

<button onclick="showSection('menuSection')">← Back</button>

<h2>⚙️ Settings</h2>

<label>Price per Cubic Meter</label>
<input type="number" id="adminPricePerCubic">

<label>Minimum Charge</label>
<input type="number" id="adminMinCharge">

<label>Admin Password</label>
<input type="password" id="adminPassword">

<button onclick="saveSettings()">💾 Save Settings</button>

</div>

<!-- CUSTOMERS -->
<div id="customersSection" class="section">

<button onclick="showSection('menuSection')">← Back</button>

<h2>👥 Customers</h2>

<input id="newCustomerName" placeholder="Customer name">

<button onclick="addCustomer()">Add Customer</button>

<div id="customersList"></div>

</div>

<!-- BILL -->
<div id="newBillSection" class="section">

<button onclick="showSection('menuSection')">← Back</button>

<h2>New Bill</h2>

<select id="billCustomer"></select>

<input type="date" id="billDate">

<input id="prevReading" readonly>

<input id="presReading" oninput="calculateTotal()">

<div class="total-display">
Total: $<span id="displayTotal">0.00</span>
</div>

<button onclick="saveBill()">Save Bill</button>

</div>

<div id="historySection" class="section">

<button onclick="showSection('menuSection')">← Back</button>

<h2>History</h2>

<div id="historyList"></div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="AccessControl.js"></script>

<script>

/* STORAGE */

const STORAGE={
customers:"water_customers_v2",
bills:"water_bills_v2",
settings:"water_settings_v2"
}

const DEFAULT_SETTINGS={
pricePerCubic:1.5,
minCharge:5,
currency:"USD",
adminPassword:"admin123"
}

/* DATA HELPERS */

function getData(key){
return JSON.parse(localStorage.getItem(STORAGE[key])||"[]")
}

function saveData(key,data){
localStorage.setItem(STORAGE[key],JSON.stringify(data))
}

function getSettings(){
return JSON.parse(localStorage.getItem(STORAGE.settings))||DEFAULT_SETTINGS
}

function saveSettingsData(s){
localStorage.setItem(STORAGE.settings,JSON.stringify(s))
}

/* NAVIGATION */

function showSection(id){

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

if(id==="customersSection") loadCustomersList()

if(id==="newBillSection") loadCustomerDropdowns()

}

/* SETTINGS */

function saveSettings(){

const password=document.getElementById("adminPassword").value

if(!isValidAdminAccess(password)){
alert("Invalid password")
return
}

const settings=getSettings()

settings.pricePerCubic=parseFloat(document.getElementById("adminPricePerCubic").value)||1.5
settings.minCharge=parseFloat(document.getElementById("adminMinCharge").value)||5

saveSettingsData(settings)

alert("Settings saved")

}

/* CUSTOMERS */

function addCustomer(){

const name=document.getElementById("newCustomerName").value.trim()

if(!name) return alert("Enter name")

const customers=getData("customers")

customers.push({
id:Date.now(),
name,
createdAt:new Date().toISOString()
})

saveData("customers",customers)

document.getElementById("newCustomerName").value=""

loadCustomersList()

}

function loadCustomersList(){

const customers=getData("customers")

const container=document.getElementById("customersList")

container.innerHTML=customers.map(c=>`
<div style="padding:10px;border:1px solid #ddd;margin:5px">
<strong>${c.name}</strong>
</div>
`).join("")

}

/* BILLING */

function loadCustomerDropdowns(){

const customers=getData("customers")

const select=document.getElementById("billCustomer")

select.innerHTML='<option value="">Select</option>'

customers.forEach(c=>{
select.innerHTML+=`<option value="${c.id}">${c.name}</option>`
})

}

function calculateTotal(){

const settings=getSettings()

const prev=parseFloat(document.getElementById("prevReading").value)||0
const pres=parseFloat(document.getElementById("presReading").value)||0

const used=pres-prev

let total=used<=0?settings.minCharge:used*settings.pricePerCubic

document.getElementById("displayTotal").textContent=total.toFixed(2)

}

function saveBill(){

const id=parseInt(document.getElementById("billCustomer").value)

if(!id) return alert("Select customer")

const pres=parseFloat(document.getElementById("presReading").value)

if(isNaN(pres)) return alert("Enter reading")

const prev=parseFloat(document.getElementById("prevReading").value)||0

const settings=getSettings()

const used=pres-prev

let total=used<=0?settings.minCharge:used*settings.pricePerCubic

const bills=getData("bills")

bills.push({
id:Date.now(),
customerId:id,
date:new Date().toISOString(),
prevReading:prev,
presReading:pres,
totalUsed:used,
totalDue:total
})

saveData("bills",bills)

alert("Bill saved")

}

/* EXPORT */

function exportToExcel(){

const bills=getData("bills")

if(!bills.length){
alert("No data")
return
}

const ws=XLSX.utils.json_to_sheet(bills)

const wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Bills")

XLSX.writeFile(wb,"water-bills.xlsx")

}

/* INIT */

document.addEventListener("DOMContentLoaded",()=>{

checkAppAccess()

document.getElementById("billDate").value=
new Date().toISOString().split("T")[0]

})

</script>

</body>
</html>
