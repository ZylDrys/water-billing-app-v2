<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#007bff">
    <title>Water Billing System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f0f2f5; padding: 10px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { text-align: center; padding: 15px; border-bottom: 2px solid #007bff; margin-bottom: 20px; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 14px; margin: 5px 3px; width: calc(50% - 11px); }
        button:hover { background: #0056b3; }
        button.full-width { width: 100%; }
        button.secondary { background: #6c757d; }
        button.success { background: #28a745; }
        button.danger { background: #dc3545; }
        button.small { padding: 8px; font-size: 12px; width: auto; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .section { display: none; }
        .section.active { display: block; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .total-display { background: #28a745; color: white; padding: 20px; border-radius: 8px; text-align: center; font-size: 24px; font-weight: bold; margin: 15px 0; }
        .search-box { margin-bottom: 15px; }
        .sort-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .settings-box { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; border: 1px solid #ddd; }
        .info-text { font-size: 12px; color: #666; margin-top: 5px; }
        @media print { body { background: white; } .container { width: 80mm; margin: 0; box-shadow: none; } .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💧 Water Billing</h1>
            <div style="font-size:12px;">Monthly Billing & Print</div>
        </div>

        <!-- MAIN MENU -->
        <div id="menuSection" class="section active">
            <button onclick="showSection('newBillSection')" class="success full-width">➕ New Bill</button>
            <button onclick="showSection('customersSection')">👥 Customers</button>
            <button onclick="showSection('historySection')">📋 History</button>
            <button onclick="showSection('settingsSection')" class="secondary full-width">⚙️ Settings</button>
            <button onclick="exportToExcel()" class="full-width secondary">📊 Export Excel</button>
        </div>

        <!-- CUSTOMERS SECTION -->
        <div id="customersSection" class="section">
            <button onclick="showSection('menuSection')" class="secondary full-width no-print">← Back</button>
            <h2>👥 Manage Customers</h2>
            
            <div class="search-box">
                <input type="text" id="customerSearch" placeholder="🔍 Search customer name..." oninput="loadCustomersList()">
                <div class="sort-buttons">
                    <button onclick="sortCustomers('asc')" class="small secondary">A → Z</button>
                    <button onclick="sortCustomers('desc')" class="small secondary">Z → A</button>
                </div>
            </div>

            <input type="text" id="newCustomerName" placeholder="New customer name">
            <button onclick="addCustomer()" class="success full-width">Add Customer</button>
            
            <div id="customersList" style="margin-top:15px;"></div>
        </div>

        <!-- NEW BILL SECTION -->
        <div id="newBillSection" class="section">
            <button onclick="showSection('menuSection')" class="secondary full-width no-print">← Back</button>
            <h2>➕ Create New Bill</h2>
            
            <input type="text" id="billSearch" placeholder="🔍 Search customer..." oninput="filterBillCustomers()">
            <select id="billCustomer" onchange="loadLastReading()"><option value="">-- Select --</option></select>
            
            <input type="date" id="billDate">
            <input type="number" id="prevReading" placeholder="Previous Reading" readonly>
            <input type="number" id="presReading" placeholder="Present Reading" oninput="calculateTotal()">
            
            <div class="settings-box">
                <div><strong>Price/m³:</strong> <span id="displayPrice"></span></div>
                <div><strong>Min. Charge:</strong> <span id="displayMin"></span></div>
                <div class="info-text">Change these in ⚙️ Settings</div>
            </div>
            
            <input type="text" id="totalUsed" placeholder="Total Used (m³)" readonly>
            <input type="text" id="totalDue" placeholder="Total Due" readonly>
            <div class="total-display">Total: <span id="displayTotal">0.00</span></div>
            
            <button onclick="saveBill(false)" class="secondary full-width no-print">💾 Save Bill</button>
            <button onclick="saveBill(true)" class="success full-width no-print">🖨️ Save & Print</button>
        </div>

        <!-- HISTORY SECTION -->
        <div id="historySection" class="section">
            <button onclick="showSection('menuSection')" class="secondary full-width no-print">← Back</button>
            <h2>📋 Transaction History</h2>
            
            <input type="text" id="historySearch" placeholder="🔍 Search customer..." oninput="loadHistory()">
            <select id="historySort" onchange="loadHistory()" style="margin-top:10px;">
                <option value="newest">📅 Newest First</option>
                <option value="oldest">📅 Oldest First</option>
            </select>
            
            <div id="historyList" style="margin-top:15px;"></div>
        </div>

        <!-- SETTINGS SECTION -->
        <div id="settingsSection" class="section">
            <button onclick="showSection('menuSection')" class="secondary full-width no-print">← Back</button>
            <h2>⚙️ Settings</h2>
            
            <div class="form-row">
                <div>
                    <label>Price per m³:</label>
                    <input type="number" id="settingsPrice" step="0.01">
                </div>
                <div>
                    <label>Minimum Amount:</label>
                    <input type="number" id="settingsMin" step="0.01">
                </div>
            </div>
            
            <label>Currency Symbol:</label>
            <select id="settingsCurrency">
                <option value="$">$ USD</option>
                <option value="₱">₱ PHP</option>
                <option value="€">€ EUR</option>
                <option value="£">£ GBP</option>
                <option value="¥">¥ JPY</option>
                <option value="Rs">Rs INR</option>
                <option value="₦">₦ NGN</option>
            </select>
            
            <div style="background:#fff3cd; padding:10px; border-radius:8px; margin:15px 0; font-size:14px;">
                <strong>🔐 Password Protection</strong><br>
                Set a password to lock changes to Price & Minimum Amount.
            </div>
            <input type="password" id="settingsPassword" placeholder="Enter new password (leave blank to keep current)">
            
            <button onclick="saveSettings()" class="success full-width">💾 Save Settings</button>
            <div id="settingsStatus" style="text-align:center; margin-top:10px; font-size:14px;"></div>
        </div>

        <!-- PRINT AREA (Hidden) -->
        <div id="printReceipt" class="print-only"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        // --- DATA STORAGE ---
        const STORAGE = { customers: 'water_customers', bills: 'water_bills', settings: 'water_settings' };
        
        // Default Settings
        let appSettings = JSON.parse(localStorage.getItem(STORAGE.settings)) || {
            pricePerCubic: 1.50,
            minAmount: 10.00,
            currency: '$',
            passwordHash: null
        };

        function getCustomers() { return JSON.parse(localStorage.getItem(STORAGE.customers) || '[]'); }
        function getBills() { return JSON.parse(localStorage.getItem(STORAGE.bills) || '[]'); }
        function saveCustomers(d) { localStorage.setItem(STORAGE.customers, JSON.stringify(d)); }
        function saveBills(d) { localStorage.setItem(STORAGE.bills, JSON.stringify(d)); }
        function saveSettingsToStorage() { localStorage.setItem(STORAGE.settings, JSON.stringify(appSettings)); }

        // --- PASSWORD HASH (Simple) ---
        function hashPassword(pwd) { let h=0; for(let i=0;i<pwd.length;i++){h=((h<<5)-h)+pwd.charCodeAt(i);h&=h;} return h.toString(); }
        function verifyPassword(pwd) { return appSettings.passwordHash && hashPassword(pwd) === appSettings.passwordHash; }

        // --- NAVIGATION ---
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            if (id === 'menuSection') updateStats();
            if (id === 'customersSection') loadCustomersList();
            if (id === 'newBillSection') { loadBillCustomers(); document.getElementById('billDate').value = new Date().toISOString().split('T')[0]; loadSettingsToBill(); }
            if (id === 'historySection') loadHistory();
            if (id === 'settingsSection') loadSettingsToUI();
        }

        function updateStats() {
            document.getElementById('totalCustomers') && (document.getElementById('totalCustomers').textContent = getCustomers().length);
            document.getElementById('totalBills') && (document.getElementById('totalBills').textContent = getBills().length);
        }

        // --- CUSTOMERS ---
        let customerSortOrder = 'asc';
        function sortCustomers(order) { customerSortOrder = order; loadCustomersList(); }
        
        function loadCustomersList() {
            const search = (document.getElementById('customerSearch')?.value || '').toLowerCase();
            let customers = getCustomers().filter(c => c.name.toLowerCase().includes(search));
            customers.sort((a,b) => customerSortOrder === 'asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name));
            
            const container = document.getElementById('customersList');
            if (!container) return;
            if (customers.length === 0) { container.innerHTML = '<p style="text-align:center;color:#666;">No customers found</p>'; return; }
            
            container.innerHTML = customers.map(c => `
                <div style="border:1px solid #ddd; padding:10px; margin:5px 0; display:flex; justify-content:space-between; align-items:center;">
                    <strong>${c.name}</strong>
                    <div>
                        <button onclick="deleteCustomer(${c.id})" class="small danger">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function addCustomer() {
            const name = document.getElementById('newCustomerName').value.trim();
            if (!name) return alert('Enter name');
            const customers = getCustomers();
            if (customers.find(c => c.name.toLowerCase() === name.toLowerCase())) return alert('Customer exists');
            customers.push({ id: Date.now(), name });
            saveCustomers(customers);
            document.getElementById('newCustomerName').value = '';
            loadCustomersList();
            alert('Customer added!');
        }

        function deleteCustomer(id) {
            if (!confirm('Delete customer and all bills?')) return;
            saveCustomers(getCustomers().filter(c => c.id !== id));
            saveBills(getBills().filter(b => b.customerId !== id));
            loadCustomersList();
        }

        // --- BILLING ---
        let billCustomers = [];
        function loadBillCustomers() {
            billCustomers = getCustomers();
            renderBillCustomerOptions(billCustomers);
        }
        function renderBillCustomerOptions(list) {
            const search = (document.getElementById('billSearch')?.value || '').toLowerCase();
            const filtered = list.filter(c => c.name.toLowerCase().includes(search));
            const html = '<option value="">-- Select Customer --</option>' + filtered.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            const sel = document.getElementById('billCustomer');
            if (sel) sel.innerHTML = html;
        }
        function filterBillCustomers() { renderBillCustomerOptions(billCustomers); }

        function loadLastReading() {
            const id = document.getElementById('billCustomer').value;
            if (!id) { document.getElementById('prevReading').value = ''; return; }
            const bills = getBills().filter(b => b.customerId == id);
            const last = bills.sort((a,b) => b.id - a.id)[0];
            document.getElementById('prevReading').value = last ? last.presReading : 0;
            calculateTotal();
        }

        function loadSettingsToBill() {
            document.getElementById('displayPrice').textContent = appSettings.currency + appSettings.pricePerCubic;
            document.getElementById('displayMin').textContent = appSettings.currency + appSettings.minAmount;
        }

        function calculateTotal() {
            const prev = parseFloat(document.getElementById('prevReading').value) || 0;
            const pres = parseFloat(document.getElementById('presReading').value) || 0;
            const used = pres - prev;
            const due = used <= 0 ? parseFloat(appSettings.minAmount) : (used * parseFloat(appSettings.pricePerCubic));
            
            document.getElementById('totalUsed').value = used > 0 ? used.toFixed(2) : '0.00';
            document.getElementById('totalDue').value = appSettings.currency + due.toFixed(2);
            document.getElementById('displayTotal').textContent = appSettings.currency + due.toFixed(2);
        }

        function saveBill(print) {
            const customerId = document.getElementById('billCustomer').value;
            if (!customerId) return alert('Select customer');
            const pres = parseFloat(document.getElementById('presReading').value);
            if (isNaN(pres)) return alert('Enter present reading');
            
            const bill = {
                id: Date.now(),
                customerId,
                date: document.getElementById('billDate').value,
                prevReading: parseFloat(document.getElementById('prevReading').value) || 0,
                presReading: pres,
                totalUsed: parseFloat(document.getElementById('totalUsed').value) || 0,
                totalDue: parseFloat(document.getElementById('displayTotal').textContent.replace(/[^0-9.-]+/g,"")) || 0,
                createdAt: Date.now()
            };
            saveBills([...getBills(), bill]);
            
            if (print) {
                const customer = getCustomers().find(c => c.id == customerId);
                printReceipt(bill, customer);
            } else {
                alert('Bill saved!');
            }
            showSection('menuSection');
        }

        // --- HISTORY ---
        function loadHistory() {
            const search = (document.getElementById('historySearch')?.value || '').toLowerCase();
            const sortType = document.getElementById('historySort')?.value || 'newest';
            let bills = getBills();
            
            if (search) {
                const customers = getCustomers();
                bills = bills.filter(b => {
                    const c = customers.find(cust => cust.id === b.customerId);
                    return c && c.name.toLowerCase().includes(search);
                });
            }
            
            bills.sort((a,b) => sortType === 'newest' ? b.createdAt - a.createdAt : a.createdAt - b.createdAt);
            
            const container = document.getElementById('historyList');
            if (!container) return;
            if (bills.length === 0) { container.innerHTML = '<p style="text-align:center;color:#666;">No bills found</p>'; return; }
            
            const customers = getCustomers();
            container.innerHTML = bills.map(b => {
                const c = customers.find(cust => cust.id === b.customerId);
                return `
                    <div style="border:1px solid #ddd; padding:10px; margin:10px 0;">
                        <strong>${c?c.name:'Unknown'}</strong> - ${new Date(b.date).toLocaleDateString()}<br>
                        Prev: ${b.prevReading} | Pres: ${b.presReading} | Used: ${b.totalUsed}<br>
                        <strong>Total: ${appSettings.currency}${b.totalDue.toFixed(2)}</strong>
                        <div style="margin-top:10px;">
                            <button onclick="printById(${b.id})" class="small">Print</button>
                            <button onclick="deleteBill(${b.id})" class="small danger">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function deleteBill(id) {
            if (!confirm('Delete this bill?')) return;
            saveBills(getBills().filter(b => b.id !== id));
            loadHistory();
        }

        function printById(id) {
            const bill = getBills().find(b => b.id === id);
            const customer = getCustomers().find(c => c.id === bill.customerId);
            printReceipt(bill, customer);
        }

        function printReceipt(bill, customer) {
            const receipt = `
                <h2>💧 WATER BILL</h2>
                <div style="text-align:center">${new Date(bill.date).toLocaleDateString('en-US',{month:'long',year:'numeric'})}</div>
                <div style="border-top:1px dashed #000; margin:5px 0;"></div>
                <p><strong>Customer:</strong> ${customer?customer.name:'Unknown'}</p>
                <p><strong>Date:</strong> ${new Date(bill.date).toLocaleDateString()}</p>
                <div style="border-top:1px dashed #000; margin:5px 0;"></div>
                <table>
                    <tr><td>Previous:</td><td style="text-align:right">${bill.prevReading} m³</td></tr>
                    <tr><td>Present:</td><td style="text-align:right">${bill.presReading} m³</td></tr>
                    <tr><td>Used:</td><td style="text-align:right">${bill.totalUsed} m³</td></tr>
                    <tr><td>Rate:</td><td style="text-align:right">${appSettings.currency}${appSettings.pricePerCubic}</td></tr>
                </table>
                <div style="text-align:center; font-size:14pt; font-weight:bold; border-top:1px solid #000; margin-top:5px; padding-top:5px;">
                    TOTAL DUE: ${appSettings.currency}${bill.totalDue.toFixed(2)}
                </div>
                <div style="text-align:center; font-size:8pt; margin-top:10px; border-top:1px dashed #000; padding-top:5px;">
                    Thank you! Printed: ${new Date().toLocaleString()}
                </div>
            `;
            document.getElementById('printReceipt').innerHTML = receipt;
            window.print();
        }

        // --- SETTINGS ---
        function loadSettingsToUI() {
            document.getElementById('settingsPrice').value = appSettings.pricePerCubic;
            document.getElementById('settingsMin').value = appSettings.minAmount;
            document.getElementById('settingsCurrency').value = appSettings.currency;
        }

        function saveSettings() {
            const newPrice = parseFloat(document.getElementById('settingsPrice').value);
            const newMin = parseFloat(document.getElementById('settingsMin').value);
            const newCurrency = document.getElementById('settingsCurrency').value;
            const newPwd = document.getElementById('settingsPassword').value;
            
            // Password check if existing
            if (appSettings.passwordHash) {
                const entered = prompt('Enter current password to save changes:');
                if (!entered || !verifyPassword(entered)) {
                    document.getElementById('settingsStatus').innerHTML = '<span style="color:red;">❌ Incorrect password!</span>';
                    return;
                }
            }
            
            // Update settings
            appSettings.pricePerCubic = newPrice;
            appSettings.minAmount = newMin;
            appSettings.currency = newCurrency;
            
            // Set new password if provided
            if (newPwd) {
                appSettings.passwordHash = hashPassword(newPwd);
                document.getElementById('settingsPassword').value = '';
                document.getElementById('settingsStatus').innerHTML = '<span style="color:green;">✅ Password updated!</span>';
            } else {
                document.getElementById('settingsStatus').innerHTML = '<span style="color:green;">✅ Settings saved!</span>';
            }
            
            saveSettingsToStorage();
            loadSettingsToBill(); // refresh bill screen if open
            setTimeout(() => document.getElementById('settingsStatus').innerHTML = '', 3000);
        }

        // --- EXPORT ---
        function exportToExcel() {
            const bills = getBills();
            if (!bills.length) return alert('No bills to export');
            const customers = getCustomers();
            const data = [['Customer','Date','Previous','Present','Used','Price/m³','Total Due']];
            bills.forEach(b => {
                const c = customers.find(cust => cust.id === b.customerId);
                data.push([c?c.name:'Unknown', b.date, b.prevReading, b.presReading, b.totalUsed, appSettings.pricePerCubic, b.totalDue]);
            });
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Water Bills');
            ws['!cols'] = [{wch:25},{wch:12},{wch:12},{wch:12},{wch:10},{wch:10},{wch:12}];
            XLSX.writeFile(wb, `water-bills-${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        // --- INIT ---
        document.getElementById('billDate').value = new Date().toISOString().split('T')[0];
        loadSettingsToBill();
    </script>
</body>
</html>
